app = 'hn-social'
primary_region = 'fra'

[build]

[env]
  NODE_ENV = 'production'
  CORS_ORIGIN = 'https://hn-social.netlify.app'
  FRONTEND_URL = 'https://hn-social.netlify.app'
  BACKEND_URL = 'https://hn-social.fly.dev'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[mounts]
  source = 'hack_nation_data'
  destination = '/data'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
